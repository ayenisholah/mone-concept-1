  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

}\n.fab:hover{background:#86684c;transform:translateY(-2px)}\n@media(prefers-reduced-motion:reduce){.fab{animation:none}}\n@media(min-width:1000px){.fab{right:32px;bottom:32px}}\n.toast{position:fixed;left:50%;bottom:26px;transform:translate(-50%,20px);z-index:130;background:var(--cta);color:var(--cta-heading);font-family:'Jost';font-size:13px;letter-spacing:.02em;padding:14px 20px;box-shadow:var(--shadow-card);opacity:0;pointer-events:none;transition:opacity .25s ease,transform .25s ease;max-width:calc(100vw - 36px);display:flex;align-items:center;gap:10px}\n.toast.is-on{opacity:1;transform:translate(-50%,0)}\n.toast i{color:var(--gold);font-size:18px;flex:none}\n<\u002Fstyle>\n<\u002Fhelmet>\n<header class=\"site-header\" id=\"top\">\n  <div class=\"container site-header__inner\">\n    <a class=\"brand\" href=\"#top\" onclick=\"{{ navTop }}\" aria-label=\"Mone Beauty Clinic — home\">\n      <i class=\"ph ph-flower-lotus brand__mark\" aria-hidden=\"true\"><\u002Fi>\n      <span class=\"brand__word\"><b>MONE<\u002Fb><span>Beauty Clinic<\u002Fspan><\u002Fspan>\n    <\u002Fa>\n    <nav class=\"nav--desktop\" aria-label=\"Primary\">\n      <a href=\"#treatments\" onclick=\"{{ navTreatments }}\">Treatments<\u002Fa>\n      <a href=\"#technologies\" onclick=\"{{ navTech }}\">Technologies<\u002Fa>\n      <a href=\"#products\" onclick=\"{{ navHome }}\">Products<\u002Fa>\n      <a href=\"#standard\" onclick=\"{{ navStandard }}\">Standard of Care<\u002Fa>\n    <\u002Fnav>\n    <div class=\"site-header__actions\">\n      <button class=\"lang\" type=\"button\" aria-label=\"Language: English\">EN<\u002Fbutton>\n      <button class=\"cart\" type=\"button\" aria-label=\"Cart\" onclick=\"{{ cartClick }}\">\n        <i class=\"ph ph-shopping-bag-open\" aria-hidden=\"true\"><\u002Fi>\n        <sc-if value=\"{{ hasCart }}\" hint-placeholder-val=\"{{ false }}\"><span class=\"cart__badge tnum\">{{ cartCount }}<\u002Fspan><\u002Fsc-if>\n      <\u002Fbutton>\n      <a class=\"btn btn--dark btn--sm header-book\" href=\"#booking\" onclick=\"{{ navBooking }}\">Book Online<\u002Fa>\n      <button class=\"nav-toggle\" type=\"button\" aria-label=\"Menu\" aria-expanded=\"{{ mobileNav }}\" onclick=\"{{ toggleNav }}\"><i class=\"ph ph-list\" aria-hidden=\"true\"><\u002Fi><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <sc-if value=\"{{ mobileNav }}\" hint-placeholder-val=\"{{ false }}\">\n    <nav class=\"mobile-menu\" aria-label=\"Mobile\">\n      <a href=\"#treatments\" onclick=\"{{ navTreatments }}\">Treatments<\u002Fa>\n      <a href=\"#technologies\" onclick=\"{{ navTech }}\">Technologies<\u002Fa>\n      <a href=\"#products\" onclick=\"{{ navHome }}\">Products<\u002Fa>\n      <a href=\"#standard\" onclick=\"{{ navStandard }}\">Standard of Care<\u002Fa>\n      <a href=\"#contact\" onclick=\"{{ navContact }}\">Contact<\u002Fa>\n      <a class=\"btn btn--dark\" href=\"#booking\" onclick=\"{{ navBooking }}\">Book Online<\u002Fa>\n    <\u002Fnav>\n  <\u002Fsc-if>\n<\u002Fheader>\n<main>\n<section class=\"hero\">\n  <div class=\"container hero__grid\">\n    <div class=\"hero__text\" data-reveal=\"\">\n      <p class=\"label\">Licensed Medical Clinic · Helsinki<\u002Fp>\n      <h1 class=\"hero__title\">Next-generation aesthetic medicine.<\u002Fh1>\n      <p class=\"hero__lede\">A comprehensive approach to beauty, skin health, and the natural harmony of face, body, and hair. Mone is a licensed medical clinic offering safe, evidence-based procedures and personalized treatment plans.<\u002Fp>\n      <div class=\"hero__actions\">\n        <a class=\"btn btn--dark\" href=\"#booking\" onclick=\"{{ navBooking }}\">Book Online<\u002Fa>\n        <a class=\"btn btn--ghost\" href=\"#treatments\" onclick=\"{{ navTreatments }}\">Explore Treatments<\u002Fa>\n      <\u002Fdiv>\n      <dl class=\"hero__meta\">\n        <div><dt>Location<\u002Fdt><dd>Solvikinkatu 5, Helsinki<\u002Fdd><\u002Fdiv>\n        <div><dt>Hours<\u002Fdt><dd>By agreement<\u002Fdd><\u002Fdiv>\n        <div><dt>Telephone<\u002Fdt><dd class=\"tnum\">+358 40 129 3800<\u002Fdd><\u002Fdiv>\n      <\u002Fdl>\n    <\u002Fdiv>\n    <div class=\"hero__media\" data-reveal=\"\">\n      <div class=\"media-frame fig\" data-ph=\"Clinical interior — treatment room\">\n        <!-- SWAP LATER: /media/hero.jpg poster + /media/hero.mp4 -->\n        <img src=\"06868992-fd85-43b4-a03d-58eb2421de5c\" data-media-src=\"/media/hero.jpg\" alt=\"A clinician performing a treatment at Mone Beauty Clinic\">\n        <video id=\"heroVideo\" muted=\"\" loop=\"\" playsinline=\"\" poster=\"/media/hero.jpg\" aria-hidden=\"true\"><source src=\"/media/hero.mp4\" type=\"video/mp4\"><\u002Fvideo>\n        <span class=\"media-tag\">Solvikinkatu 5<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n<section class=\"section\" id=\"standard\">\n  <div class=\"container\">\n    <div class=\"section-marker\"><span class=\"section-index tnum\">01<\u002Fspan><span class=\"label\">Standard of care<\u002Fspan><\u002Fdiv>\n    <div class=\"section-head\">\n      <h2 class=\"section-title\" data-reveal=\"\">Our standard of care<\u002Fh2>\n      <p class=\"section-lede\" data-reveal=\"\">Every treatment is planned and performed to medical standards. Care follows a defined clinical pathway — from the first consultation to ongoing maintenance.<\u002Fp>\n    <\u002Fdiv>\n    <ol class=\"pathway\">\n      <li class=\"pathway__step\" data-reveal=\"\"><span class=\"pathway__num tnum\">01<\u002Fspan><div><h3 class=\"pathway__name\">Consultation<\u002Fh3><p class=\"pathway__desc\">A structured medical consultation to review history, concerns, and expectations.<\u002Fp><\u002Fdiv><\u002Fli>\n      <li class=\"pathway__step\" data-reveal=\"\"><span class=\"pathway__num tnum\">02<\u002Fspan><div><h3 class=\"pathway__name\">Diagnosis<\u002Fh3><p class=\"pathway__desc\">Instrumental skin and scalp analysis to establish an accurate baseline.<\u002Fp><\u002Fdiv><\u002Fli>\n      <li class=\"pathway__step\" data-reveal=\"\"><span class=\"pathway__num tnum\">03<\u002Fspan><div><h3 class=\"pathway__name\">Treatment plan<\u002Fh3><p class=\"pathway__desc\">A written plan defining procedures, their sequence, and the expected timeline.<\u002Fp><\u002Fdiv><\u002Fli>\n      <li class=\"pathway__step\" data-reveal=\"\"><span class=\"pathway__num tnum\">04<\u002Fspan><div><h3 class=\"pathway__name\">Care<\u002Fh3><p class=\"pathway__desc\">Professional home care and scheduled follow-up to maintain results.<\u002Fp><\u002Fdiv><\u002Fli>\n    <\u002Fol>\n  <\u002Fdiv>\n  <div class=\"credentials {{ credClass }}\">\n    <div class=\"container credentials__inner\">\n      <div class=\"credentials__head\">\n        <span class=\"label\">Credentials<\u002Fspan>\n        <h3 class=\"credentials__title\">The standards we operate to.<\u002Fh3>\n      <\u002Fdiv>\n      <div class=\"credentials__grid\">\n        <div class=\"cred\"><span class=\"cred__n tnum\">01<\u002Fspan><div><p class=\"cred__name\">Licensed medical clinic<\u002Fp><p class=\"cred__desc\">A licensed medical clinic operating under qualified supervision. [CLINIC TO PROVIDE]<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"cred\"><span class=\"cred__n tnum\">02<\u002Fspan><div><p class=\"cred__name\">EU standards<\u002Fp><p class=\"cred__desc\">Procedures and devices meet applicable EU health and safety standards.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"cred\"><span class=\"cred__n tnum\">03<\u002Fspan><div><p class=\"cred__name\">Evidence-based<\u002Fp><p class=\"cred__desc\">Treatments are selected on clinical evidence and diagnostic findings.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"cred\"><span class=\"cred__n tnum\">04<\u002Fspan><div><p class=\"cred__name\">Personalized programs<\u002Fp><p class=\"cred__desc\">Each program is written for the individual patient, not a fixed menu.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"cred\"><span class=\"cred__n tnum\">05<\u002Fspan><div><p class=\"cred__name\">GDPR confidentiality<\u002Fp><p class=\"cred__desc\">Patient information is processed confidentially in accordance with GDPR.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"cred\"><span class=\"cred__n tnum\">06<\u002Fspan><div><p class=\"cred__name\">Online booking, 24/7<\u002Fp><p class=\"cred__desc\">Consultations can be requested online at any time of day.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n<section class=\"section section--alt\" id=\"treatments\">\n  <div class=\"container\">\n    <div class=\"section-marker\"><span class=\"section-index tnum\">02<\u002Fspan><span class=\"label\">Treatments<\u002Fspan><\u002Fdiv>\n    <div class=\"section-head\">\n      <h2 class=\"section-title\" data-reveal=\"\">Clinical services<\u002Fh2>\n      <p class=\"section-lede\" data-reveal=\"\">Eight treatment categories, each planned around a diagnosis. Select a treatment to request an appointment, or read the full protocol.<\u002Fp>\n    <\u002Fdiv>\n    <ul class=\"directory\">\n      <sc-for list=\"{{ services }}\" as=\"item\" hint-placeholder-count=\"6\">\n        <li class=\"directory__row\" data-reveal=\"\">\n          <span class=\"directory__index tnum\">{{ item.n }}<\u002Fspan>\n          <div class=\"directory__media fig\" data-ph=\"{{ item.ph }}\"><img src=\"{{ item.img }}\" data-fallback=\"{{ item.fallback }}\" alt=\"{{ item.name }}\" loading=\"lazy\"><\u002Fdiv>\n          <div class=\"directory__main\">\n            <h3 class=\"directory__name\">{{ item.name }}<\u002Fh3>\n            <p class=\"directory__desc\">{{ item.desc }}<\u002Fp>\n          <\u002Fdiv>\n          <div class=\"directory__side\">\n            <span class=\"directory__dur label tnum\">{{ item.duration }}<\u002Fspan>\n            <div class=\"directory__actions\">\n              <button class=\"btn btn--ghost btn--sm\" type=\"button\" onclick=\"{{ item.onBook }}\">Book<\u002Fbutton>\n              <a class=\"link-more\" href=\"{{ item.route }}\">Read more<\u002Fa>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fli>\n      <\u002Fsc-for>\n      <li class=\"directory__row directory__row--soon\">\n        <span class=\"directory__index tnum\">09<\u002Fspan>\n        <div class=\"directory__media fig\" data-ph=\"Coming soon\"><\u002Fdiv>\n        <div class=\"directory__main\">\n          <h3 class=\"directory__name\">Injectable aesthetic medicine<\u002Fh3>\n          <p class=\"directory__desc\">Physician-led injectable treatments. [CLINIC TO PROVIDE]<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"directory__side\">\n          <span class=\"soon-tag\">Coming soon<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fli>\n      <li class=\"directory__row directory__row--soon\">\n        <span class=\"directory__index tnum\">10<\u002Fspan>\n        <div class=\"directory__media fig\" data-ph=\"Coming soon\"><\u002Fdiv>\n        <div class=\"directory__main\">\n          <h3 class=\"directory__name\">Medical consultation<\u002Fh3>\n          <p class=\"directory__desc\">Dedicated diagnostic consultation with a clinician. [CLINIC TO PROVIDE]<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"directory__side\">\n          <span class=\"soon-tag\">Coming soon<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n<\u002Fsection>\n<section class=\"section\" id=\"technologies\">\n  <div class=\"container\">\n    <div class=\"section-marker\"><span class=\"section-index tnum\">03<\u002Fspan><span class=\"label\">Technologies<\u002Fspan><\u002Fdiv>\n    <div class=\"section-head\">\n      <h2 class=\"section-title\" data-reveal=\"\">Clinical technologies<\u002Fh2>\n      <p class=\"section-lede\" data-reveal=\"\">The devices behind our treatments. Each is a medical-grade system, operated by trained clinicians and selected for documented results.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"tech-grid\">\n      <sc-for list=\"{{ technologies }}\" as=\"item\" hint-placeholder-count=\"4\">\n        <article class=\"tech-card\" data-reveal=\"\">\n          <div class=\"tech-card__media fig\" data-ph=\"{{ item.ph }}\"><img src=\"{{ item.img }}\" data-fallback=\"{{ item.fallback }}\" alt=\"{{ item.name }} device in use\" loading=\"lazy\"><\u002Fdiv>\n          <div class=\"tech-card__body\">\n            <p class=\"tech-card__spec label\">{{ item.spec }}<\u002Fp>\n            <h3 class=\"tech-card__name\">{{ item.name }}<\u002Fh3>\n            <p class=\"tech-card__text\">{{ item.sentence }}<\u002Fp>\n            <div class=\"tech-card__actions\">\n              <button class=\"btn btn--ghost btn--sm\" type=\"button\" onclick=\"{{ item.onBook }}\">Book<\u002Fbutton>\n              <a class=\"link-more\" href=\"{{ item.route }}\">Read more<\u002Fa>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Farticle>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n<section class=\"section section--alt\" id=\"products\">\n  <div class=\"container\">\n    <div class=\"section-marker\"><span class=\"section-index tnum\">04<\u002Fspan><span class=\"label\">Products<\u002Fspan><\u002Fdiv>\n    <div class=\"section-head\">\n      <h2 class=\"section-title\" data-reveal=\"\">Professional products<\u002Fh2>\n      <p class=\"section-lede\" data-reveal=\"\">Professional formulations dispensed as part of your treatment plan. Two clinical lines continue your results between appointments.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"tabs\" role=\"tablist\" aria-label=\"Home care lines\">\n      <button class=\"tab {{ aroshaTabClass }}\" type=\"button\" role=\"tab\" onclick=\"{{ setArosha }}\">AROSHA<span class=\"count\">{{ aroshaCount }}<\u002Fspan><\u002Fbutton>\n      <button class=\"tab {{ dixidoxTabClass }}\" type=\"button\" role=\"tab\" onclick=\"{{ setDixidox }}\">DIXIDOX de Luxe<span class=\"count\">{{ dixidoxCount }}<\u002Fspan><\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"formulary formulary--arosha {{ aroshaFormClass }}\">\n      <div class=\"product-grid\">\n        <sc-for list=\"{{ aroshaProducts }}\" as=\"item\" hint-placeholder-count=\"12\">\n          <article class=\"product-card\">\n            <div class=\"product-card__media fig\" data-ph=\"{{ item.ph }}\"><img src=\"{{ item.img }}\" data-fallback=\"{{ item.fallback }}\" alt=\"{{ item.name }}\" loading=\"lazy\"><\u002Fdiv>\n            <div class=\"product-card__body\">\n              <p class=\"product-card__brand\">{{ item.line }}<\u002Fp>\n              <h3 class=\"product-card__name\">{{ item.name }}<\u002Fh3>\n              <p class=\"product-card__desc\">{{ item.desc }}<\u002Fp>\n              <div class=\"product-card__meta\">\n                <span class=\"product-card__size\">{{ item.size }}<\u002Fspan>\n                <span class=\"product-card__price tnum\">{{ item.price }}<\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"product-card__actions\">\n                <button class=\"product-add {{ item.addedClass }}\" type=\"button\" aria-label=\"Add to cart\" title=\"Add to cart\" onclick=\"{{ item.onAdd }}\">\n                  <sc-if value=\"{{ item.added }}\" hint-placeholder-val=\"{{ false }}\"><i class=\"ph ph-check\" aria-hidden=\"true\"><\u002Fi><\u002Fsc-if>\n                  <sc-if value=\"{{ item.notAdded }}\" hint-placeholder-val=\"{{ true }}\"><i class=\"ph ph-shopping-cart-simple\" aria-hidden=\"true\"><\u002Fi><\u002Fsc-if>\n                <\u002Fbutton>\n                <a class=\"product-more\" href=\"/catalog/{{ item.slug }}\">Read more<\u002Fa>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Farticle>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div class=\"formulary__foot\"><p class=\"formulary__note\"><i class=\"ph ph-flask\" aria-hidden=\"true\"><\u002Fi>AROSHA body line — dispensed as part of your treatment plan.<\u002Fp><a class=\"btn btn--ghost btn--sm\" href=\"/arosha\">View all 22 products<\u
